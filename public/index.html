<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do Application</title>
    <link rel="stylesheet" href="../src/styles/globals.css" />
    <link rel="stylesheet" href="../src/styles/index.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <main id="app">
        <header>
            <div class="header-left">
                <img src="../public/assets/876f53dc-7a68-4dd4-9218-34ee8208d19c.png" alt="App logo" width="80"
                    height="80" />
                <div class="header-left--title">
                    <h1 class="heading2">Welcome back!</h1>
                    <p class="p">Start organizing your day, Turner.</p>
                </div>
            </div>
            <div>
                <ul class="header-right">
                    <li><button type="button"><span class="p">Mood</span><i data-lucide="meh"></i></button></li>
                    <li><button type="button"><i data-lucide="cloud-sun"></i></button></li>
                    <li><button type="button"><i data-lucide="user"></i></button></li>
                </ul>
            </div>
        </header>
    </main>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
