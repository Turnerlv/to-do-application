<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Selector</title>
    <link rel="stylesheet" href="../styles/globals.css" />
    <link rel="stylesheet" href="../styles/mood-selector-form.css" />
</head>
<div class="mood-modal" role="dialog" aria-modal="true" aria-labelledby="mood-modal-title">
    <div class="mood-modal__content">
        <header class="mood-modal__header">
            <h2 id="mood-modal-title" class="heading4 panel-heading">Mood</h2>
            <button class="mood-modal__close" type="button" aria-label="Close modal">×</button>
        </header>

        <form class="mood-form">
            <div class="mood-form__group">
                <label class="small mood-form--label" for="mood-level">How are you feeling?</label>
                <input class="mood-form--input" type="range" id="mood-level" name="moodLevel" min="0" max="100"
                    value="50" />
            </div>

            <div class="mood-form__actions">
                <button class="mood-form__submit" type="submit">Save mood</button>
            </div>
        </form>
    </div>
</div>
