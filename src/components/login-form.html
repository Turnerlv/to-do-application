<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link rel="stylesheet" href="../styles/globals.css" />
    <link rel="stylesheet" href="../styles/login-form.css" />
</head>
<div class="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
    <div class="login-modal__content">
        <header class="login-modal__header">
            <h2 id="login-modal-title" class="heading4 panel-heading">Log in</h2>
            <button class="login-modal__close" type="button" aria-label="Close modal">×</button>
        </header>

        <form class="login-form">
            <div class="login-form__group">
                <label class="small login-form--label" for="login-name">Name</label>
                <input class="login-form--input" type="text" id="login-name" name="loginName"
                    placeholder="Enter your name" required />
            </div>

            <div class="login-form__group">
                <label class="small login-form--label" for="login-email">Email</label>
                <input class="login-form--input" type="email" id="login-email" name="loginEmail"
                    placeholder="Enter your email" required />
            </div>

            <div class="login-form__group">
                <label class="small login-form--label" for="login-password">Password</label>
                <input class="login-form--input" type="password" id="login-password" name="loginPassword"
                    placeholder="Enter your password" required />
            </div>

            <div class="login-form__actions">
                <button class="login-form__submit" type="submit">Log in</button>
            </div>
        </form>
    </div>
</div>
